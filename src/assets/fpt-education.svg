<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 40" fill="none">
  <!-- Badge shape with rounded corners -->
  <rect x="0" y="0" width="42" height="40" rx="5" fill="white"/>
  <!-- Left strip green -->
  <rect x="0" y="0" width="14" height="40" rx="5" fill="#1F7A3A"/>
  <rect x="10" y="0" width="4" height="40" fill="#1F7A3A"/>
  <!-- Right strip orange -->
  <rect x="28" y="0" width="14" height="40" rx="5" fill="#E8651A"/>
  <rect x="28" y="0" width="4" height="40" fill="#E8651A"/>
  <!-- FPT label in badge -->
  <text
    x="21" y="26"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="14"
    fill="white"
    text-anchor="middle"
    letter-spacing="-0.5"
  >FPT</text>

  <!-- "Education" text -->
  <text
    x="50" y="14"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="10.5"
    fill="white"
    dominant-baseline="middle"
  >Education</text>
  <!-- ® -->
  <text x="109" y="10" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.75)">®</text>

  <!-- FPT UNIVERSITY -->
  <text
    x="50" y="32"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="13.5"
    fill="white"
    letter-spacing="0.3"
  >FPT UNIVERSITY</text>
</svg>
